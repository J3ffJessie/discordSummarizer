<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Torclation by Botman</title>
    <style>
      .header {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 1.5rem;
      }
      img {
        width: 50px;
        height: 50px;
      }
      body {
        font-family: Arial, sans-serif;
        background: #111;
        color: #fff;
        margin: 0;
        padding: 20px;
      }

      h1 {
        margin-top: 0;
        color: #00ffcc;
      }

      #status {
        margin-bottom: 15px;
        font-size: 14px;
        opacity: 0.7;
        display: flex;
        justify-content: center;
      }

      #language-bar {
        display: flex;
        align-items: center;
        justify-content: flex-end;
        gap: 10px;
        margin-bottom: 10px;
        font-size: 13px;
        opacity: 0.85;
      }

      #language-bar label {
        color: #00ffcc;
        font-weight: bold;
      }

      #language-select {
        background: #1e1e1e;
        color: #fff;
        border: 1px solid #00ffcc;
        border-radius: 8px;
        padding: 4px 10px;
        font-size: 13px;
        cursor: pointer;
        outline: none;
      }

      #language-select:hover {
        background: #2a2a2a;
      }

      #captions {
        display: flex;
        flex-direction: column;
        gap: 12px;
        height: calc(100vh - 220px);
        overflow-y: auto;
        padding: 10px;
        border: 1px solid white;
        border-radius: 25px;
        position: relative;
      }

      #captions::before {
        content: '';
        position: absolute;
        inset: 0;
        background-image: url(./torc-logo.png);
        background-repeat: no-repeat;
        background-position: center;
        background-size: 50%;
        opacity: 0.15;
        border-radius: 25px;
        pointer-events: none;
      }

      .caption {
        background: #1e1e1e;
        padding: 10px 14px;
        border-radius: 8px;
        border-left: 4px solid #00ffcc;
      }

      .original {
        font-size: 15px;
        opacity: 0.6;
        color: silver;
        font-style: italic;
      }

      .translated {
        font-size: 20px;
        margin-top: 4px;
      }

      .timestamp {
        font-size: 11px;
        opacity: 0.4;
        margin-top: 4px;
      }

      /* ── Welcome / onboarding modal ── */
      #welcome-modal {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.85);
        z-index: 200;
        align-items: center;
        justify-content: center;
      }

      #welcome-modal.open {
        display: flex;
      }

      #welcome-modal-content {
        background: #1a1a1a;
        border: 1px solid #00ffcc;
        border-radius: 20px;
        padding: 36px 40px;
        max-width: 440px;
        width: 90%;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 18px;
        text-align: center;
      }

      #welcome-modal-content img {
        width: 72px;
        height: 72px;
        opacity: 0.9;
      }

      #welcome-modal-content h2 {
        margin: 0;
        font-size: 22px;
        color: #00ffcc;
      }

      #welcome-modal-content p {
        margin: 0;
        font-size: 14px;
        color: #bbb;
        line-height: 1.6;
      }

      #welcome-lang-select {
        background: #1e1e1e;
        color: #fff;
        border: 1px solid #00ffcc;
        border-radius: 10px;
        padding: 8px 14px;
        font-size: 15px;
        cursor: pointer;
        outline: none;
        width: 100%;
      }

      #welcome-lang-select:hover {
        background: #2a2a2a;
      }

      #welcome-start-btn {
        background: #00ffcc;
        color: #111;
        border: none;
        border-radius: 10px;
        padding: 10px 28px;
        font-size: 15px;
        font-weight: bold;
        cursor: pointer;
        width: 100%;
      }

      #welcome-start-btn:hover {
        background: #00e6b8;
      }

      #welcome-skip {
        font-size: 12px;
        color: #555;
        cursor: pointer;
        text-decoration: underline;
        background: none;
        border: none;
      }

      #welcome-skip:hover {
        color: #888;
      }

      /* ── Session End modal ── */
      #session-end-modal {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.88);
        z-index: 300;
        align-items: center;
        justify-content: center;
      }

      #session-end-modal.open {
        display: flex;
      }

      #session-end-content {
        background: #1a1a1a;
        border: 1px solid #00ffcc;
        border-radius: 20px;
        padding: 36px 40px;
        max-width: 560px;
        width: 92%;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 18px;
        text-align: center;
        max-height: 90vh;
        overflow-y: auto;
      }

      #session-end-content h2 {
        margin: 0;
        font-size: 22px;
        color: #00ffcc;
      }

      #session-end-content p {
        margin: 0;
        font-size: 14px;
        color: #bbb;
        line-height: 1.6;
      }

      .end-btn {
        background: #00ffcc;
        color: #111;
        border: none;
        border-radius: 10px;
        padding: 10px 24px;
        font-size: 14px;
        font-weight: bold;
        cursor: pointer;
        width: 100%;
      }

      .end-btn:hover {
        background: #00e6b8;
      }

      .end-btn.secondary {
        background: #1e1e1e;
        color: #00ffcc;
        border: 1px solid #00ffcc;
      }

      .end-btn.secondary:hover {
        background: #2a2a2a;
      }

      .end-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }

      #summary-section {
        display: none;
        width: 100%;
        text-align: left;
      }

      #summary-section h3 {
        color: #00ffcc;
        margin: 0 0 10px 0;
        font-size: 16px;
      }

      #summary-text {
        background: #111;
        border: 1px solid #333;
        border-radius: 10px;
        padding: 14px;
        font-size: 14px;
        color: #ddd;
        line-height: 1.7;
        white-space: pre-wrap;
        word-break: break-word;
        max-height: 260px;
        overflow-y: auto;
        font-family: Arial, sans-serif;
      }

      .summary-actions {
        display: flex;
        gap: 10px;
        margin-top: 10px;
        width: 100%;
      }

      .summary-actions .end-btn {
        flex: 1;
        font-size: 13px;
        padding: 8px 14px;
      }

      #dismiss-btn {
        font-size: 12px;
        color: #555;
        cursor: pointer;
        text-decoration: underline;
        background: none;
        border: none;
      }

      #dismiss-btn:hover {
        color: #888;
      }
    </style>
  </head>
  <body>
    <div class="header">
      <img src="torc-logo.png" alt="Bot Logo" width="150" />
      <h1>Live Voice Translation</h1>
    </div>
    <div id="status">Connecting...</div>

    <div id="language-bar">
      <label for="language-select">Caption language:</label>
      <select id="language-select">
        <option value="English">English</option>
        <option value="Arabic">Arabic</option>
        <option value="Bengali">Bengali</option>
        <option value="Chinese (Simplified)">Chinese (Simplified)</option>
        <option value="Chinese (Traditional)">Chinese (Traditional)</option>
        <option value="Czech">Czech</option>
        <option value="Dutch">Dutch</option>
        <option value="French">French</option>
        <option value="German">German</option>
        <option value="Greek">Greek</option>
        <option value="Hebrew">Hebrew</option>
        <option value="Hindi">Hindi</option>
        <option value="Hungarian">Hungarian</option>
        <option value="Indonesian">Indonesian</option>
        <option value="Italian">Italian</option>
        <option value="Japanese">Japanese</option>
        <option value="Korean">Korean</option>
        <option value="Malay">Malay</option>
        <option value="Polish">Polish</option>
        <option value="Portuguese">Portuguese</option>
        <option value="Romanian">Romanian</option>
        <option value="Russian">Russian</option>
        <option value="Spanish">Spanish</option>
        <option value="Swedish">Swedish</option>
        <option value="Thai">Thai</option>
        <option value="Turkish">Turkish</option>
        <option value="Ukrainian">Ukrainian</option>
        <option value="Vietnamese">Vietnamese</option>
      </select>
    </div>

    <div id="captions"></div>

    <!-- First-time language selection modal -->
    <div id="welcome-modal">
      <div id="welcome-modal-content">
        <img src="torc-logo.png" alt="Torc Logo" />
        <h2>Welcome to Live Captions</h2>
        <p>Choose the language you'd like captions displayed in. You can change this at any time using the dropdown at the top of the page.</p>
        <select id="welcome-lang-select">
          <option value="English">English</option>
          <option value="Arabic">Arabic</option>
          <option value="Bengali">Bengali</option>
          <option value="Chinese (Simplified)">Chinese (Simplified)</option>
          <option value="Chinese (Traditional)">Chinese (Traditional)</option>
          <option value="Czech">Czech</option>
          <option value="Dutch">Dutch</option>
          <option value="French">French</option>
          <option value="German">German</option>
          <option value="Greek">Greek</option>
          <option value="Hebrew">Hebrew</option>
          <option value="Hindi">Hindi</option>
          <option value="Hungarian">Hungarian</option>
          <option value="Indonesian">Indonesian</option>
          <option value="Italian">Italian</option>
          <option value="Japanese">Japanese</option>
          <option value="Korean">Korean</option>
          <option value="Malay">Malay</option>
          <option value="Polish">Polish</option>
          <option value="Portuguese">Portuguese</option>
          <option value="Romanian">Romanian</option>
          <option value="Russian">Russian</option>
          <option value="Spanish">Spanish</option>
          <option value="Swedish">Swedish</option>
          <option value="Thai">Thai</option>
          <option value="Turkish">Turkish</option>
          <option value="Ukrainian">Ukrainian</option>
          <option value="Vietnamese">Vietnamese</option>
        </select>
        <button id="welcome-start-btn">Get Started</button>
        <button id="welcome-skip">Skip (use English)</button>
      </div>
    </div>

    <!-- Session ended modal -->
    <div id="session-end-modal">
      <div id="session-end-content">
        <img src="torc-logo.png" alt="Torc Logo" style="width:56px;height:56px;opacity:0.85;" />
        <h2>Session Ended</h2>
        <p id="session-end-subtitle">The translation session has ended.</p>

        <button class="end-btn" id="download-transcript-btn">Download Transcript</button>
        <button class="end-btn secondary" id="generate-summary-btn">Generate AI Summary</button>

        <div id="summary-section">
          <h3>Event Summary</h3>
          <div id="summary-text"></div>
          <div class="summary-actions">
            <button class="end-btn secondary" id="copy-summary-btn">Copy Summary</button>
            <button class="end-btn secondary" id="download-summary-btn">Download Summary</button>
          </div>
        </div>

        <button id="dismiss-btn">Dismiss and view captions</button>
      </div>
    </div>

    <script>
      const params = new URLSearchParams(window.location.search);
      const guild = params.get("guild");
      const token = params.get("token");

      if (!guild || !token) {
        document.getElementById("status").innerText = "Invalid session.";
        throw new Error("Missing session parameters.");
      }

      const protocol = window.location.protocol === "https:" ? "wss:" : "ws:";
      const wsUrl = `${protocol}//${window.location.host}?guild=${guild}&token=${token}`;

      const captionsDiv = document.getElementById("captions");
      const statusDiv = document.getElementById("status");
      const langSelect = document.getElementById("language-select");

      // Restore saved language preference
      const savedLang = localStorage.getItem("captionLanguage");
      if (savedLang) langSelect.value = savedLang;

      let activeWs = null;
      let sessionEnded = false;
      const captionLog = [];

      function sendLanguage(ws) {
        if (ws && ws.readyState === WebSocket.OPEN) {
          ws.send(JSON.stringify({ type: "setLanguage", language: langSelect.value }));
        }
      }

      langSelect.addEventListener("change", () => {
        localStorage.setItem("captionLanguage", langSelect.value);
        sendLanguage(activeWs);
      });

      function connect() {
        const ws = new WebSocket(wsUrl);
        activeWs = ws;

        ws.onopen = () => {
          statusDiv.innerText = "Connected";
          sendLanguage(ws);
        };

        ws.onclose = () => {
          activeWs = null;
          if (sessionEnded) return; // intentional end — don't reconnect
          statusDiv.innerText = "Disconnected. Reconnecting...";
          setTimeout(connect, 3000);
        };

        ws.onerror = () => {
          if (!sessionEnded) statusDiv.innerText = "Connection error. Reconnecting...";
        };

        ws.onmessage = (event) => {
          const data = JSON.parse(event.data);

          if (data.type === "sessionEnd") {
            sessionEnded = true;
            showSessionEndModal();
            return;
          }

          // Track caption for export/summary
          captionLog.push({
            speaker: data.displayName || data.userId,
            translated: data.translated,
            original: data.original,
            timestamp: new Date(data.timestamp).toLocaleTimeString(),
          });

          const div = document.createElement("div");
          div.className = "caption";

          const speaker = document.createElement("div");
          speaker.style.fontWeight = "bold";
          speaker.style.color = "#008080";
          speaker.style.fontSize = '20px';
          speaker.innerText = data.displayName || data.userId;

          const translated = document.createElement("div");
          translated.className = "translated";
          translated.innerText = data.translated;

          const original = document.createElement("div");
          original.className = "original";
          original.innerText = data.original;

          const timestamp = document.createElement("div");
          timestamp.className = "timestamp";
          timestamp.innerText = new Date(data.timestamp).toLocaleTimeString();

          div.appendChild(speaker);
          div.appendChild(translated);
          div.appendChild(original);
          div.appendChild(timestamp);

          const isNearBottom =
            captionsDiv.scrollHeight - captionsDiv.scrollTop <=
            captionsDiv.clientHeight + 50;

          captionsDiv.appendChild(div);

          if (isNearBottom) {
            captionsDiv.scrollTop = captionsDiv.scrollHeight;
          }
        };
      }

      connect();

      // ── Session end modal ──
      const sessionEndModal = document.getElementById("session-end-modal");
      const sessionEndSubtitle = document.getElementById("session-end-subtitle");
      const downloadTranscriptBtn = document.getElementById("download-transcript-btn");
      const generateSummaryBtn = document.getElementById("generate-summary-btn");
      const summarySection = document.getElementById("summary-section");
      const summaryText = document.getElementById("summary-text");
      const copySummaryBtn = document.getElementById("copy-summary-btn");
      const downloadSummaryBtn = document.getElementById("download-summary-btn");
      const dismissBtn = document.getElementById("dismiss-btn");

      function showSessionEndModal() {
        statusDiv.innerText = "Session ended";
        const count = captionLog.length;
        sessionEndSubtitle.innerText =
          count > 0
            ? `The translation session has ended. ${count} caption${count === 1 ? "" : "s"} were captured.`
            : "The translation session has ended. No captions were captured.";
        summarySection.style.display = "none";
        generateSummaryBtn.disabled = captionLog.length === 0;
        sessionEndModal.classList.add("open");
      }

      dismissBtn.addEventListener("click", () => {
        sessionEndModal.classList.remove("open");
      });

      downloadTranscriptBtn.addEventListener("click", () => {
        if (captionLog.length === 0) return;
        const lines = captionLog.map(c =>
          `[${c.timestamp}] ${c.speaker}\n  ${c.translated}\n  (${c.original})`
        );
        const text = lines.join("\n\n");
        triggerDownload(text, "transcript.txt", "text/plain");
      });

      generateSummaryBtn.addEventListener("click", async () => {
        generateSummaryBtn.disabled = true;
        generateSummaryBtn.innerText = "Generating...";
        summarySection.style.display = "none";

        try {
          const res = await fetch("/api/summarize", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ captions: captionLog }),
          });
          const json = await res.json();
          if (!res.ok) throw new Error(json.error || "Unknown error");

          summaryText.innerText = json.summary;
          summarySection.style.display = "block";
        } catch (err) {
          summaryText.innerText = "Failed to generate summary: " + err.message;
          summarySection.style.display = "block";
        } finally {
          generateSummaryBtn.disabled = false;
          generateSummaryBtn.innerText = "Regenerate Summary";
        }
      });

      copySummaryBtn.addEventListener("click", () => {
        navigator.clipboard.writeText(summaryText.innerText).then(() => {
          copySummaryBtn.innerText = "Copied!";
          setTimeout(() => { copySummaryBtn.innerText = "Copy Summary"; }, 2000);
        });
      });

      downloadSummaryBtn.addEventListener("click", () => {
        triggerDownload(summaryText.innerText, "event-summary.txt", "text/plain");
      });

      function triggerDownload(text, filename, mimeType) {
        const blob = new Blob([text], { type: mimeType });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = filename;
        a.click();
        URL.revokeObjectURL(url);
      }

      // ── Welcome modal (first-time visit only) ──
      const welcomeModal = document.getElementById("welcome-modal");
      const welcomeLangSelect = document.getElementById("welcome-lang-select");
      const welcomeStartBtn = document.getElementById("welcome-start-btn");
      const welcomeSkipBtn = document.getElementById("welcome-skip");

      function confirmLanguage(lang) {
        langSelect.value = lang;
        localStorage.setItem("captionLanguage", lang);
        sendLanguage(activeWs);
        welcomeModal.classList.remove("open");
      }

      welcomeStartBtn.addEventListener("click", () => {
        confirmLanguage(welcomeLangSelect.value);
      });

      welcomeSkipBtn.addEventListener("click", () => {
        confirmLanguage("English");
      });

      // Show modal only if no preference has been saved yet
      if (!savedLang) {
        welcomeModal.classList.add("open");
      }
    </script>
  </body>
</html>
